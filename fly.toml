# fly.toml app configuration file generated for memo-sync on 2026-02-04T01:06:07-05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'memo-sync'
primary_region = 'nrt'

[build]

[env]
  GIN_MODE = 'release'
  LOG_LEVEL = 'info'
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  # syncer runs a long-lived background goroutine (member scan loop) AND owns
  # in-process keypool state — running two copies in parallel doubles FFLogs
  # quota consumption and races on the same member set. So this is a
  # SINGLETON workload: we want exactly 1 machine, never 2.
  auto_stop_machines = 'off'
  auto_start_machines = false
  # Setting min_machines_running = 0 disables fly's HA scaling that otherwise
  # spins up a second machine "for high availability and zero downtime
  # deployments". Combined with the immediate deploy strategy below, deploys
  # replace the single machine in-place (brief downtime, acceptable for a
  # background worker; clients don't rely on memo-sync uptime directly).
  min_machines_running = 0
  processes = ['app']

[deploy]
  strategy = 'immediate'

[[vm]]
  size = 'shared-cpu-1x'

[[metrics]]
  port = 8080
  path = '/metrics'
