name: Build image

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - ".gitignore"
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/memo-syncer
  GO_VERSION: "1.25.10"

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          # full history + tags so `git describe --tags` works for the version baked into MEMO_VERSION / notify payload.
          fetch-depth: 0

      - name: Compute image tag + version
        id: meta
        run: |
          echo "tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "build=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          # prefer git describe; fall back to short SHA if no tag yet.
          # normalize "v7.5.2.1-3-g9cfe074" → "v7.5.2.1+3" for nicer display; exact-tag commits stay as "v7.5.2.1".
          raw=$(git describe --tags --always 2>/dev/null || echo "${GITHUB_SHA::7}")
          case "$raw" in
            *-g*) base=${raw%-g*}; n=${base##*-}; tag=${base%-*}; pretty="$tag+$n" ;;
            *)    pretty="$raw" ;;
          esac
          echo "version=$pretty" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE }}:latest
          build-args: |
            GO_VERSION=${{ env.GO_VERSION }}
            MEMO_VERSION=${{ steps.meta.outputs.version }}
            MEMO_BUILD=${{ steps.meta.outputs.build }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  dispatch-deploy:
    needs: build
    if: needs.build.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v2
        id: ops-token
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: 'memo-ops'

      - uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ steps.ops-token.outputs.token }}
          repository: open-xiv/memo-ops
          event-type: deploy-memo-syncer
          client-payload: |
            {
              "image_tag": "${{ needs.build.outputs.tag }}",
              "version": "${{ needs.build.outputs.version }}"
            }

  notify:
    needs: build
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Compute status
        id: s
        run: |
          if [[ "${{ needs.build.result }}" == "success" ]]; then
            echo "status=success" >> "$GITHUB_OUTPUT"
          else
            echo "status=failure" >> "$GITHUB_OUTPUT"
          fi

      - uses: open-xiv/gha-actions/notify-deploy@v1
        with:
          status: ${{ steps.s.outputs.status }}
          service: memo-syncer
          kind: build
          version: ${{ needs.build.outputs.version }}
          cluster: ''
          build: ${{ needs.build.result }}
          webhook_url: ${{ secrets.BOT_WEBHOOK_URL }}
          webhook_token: ${{ secrets.BOT_WEBHOOK_TOKEN }}
