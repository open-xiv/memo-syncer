name: build-and-deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - ".gitignore"
      - "k8s/**"
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/memo-syncer
  GO_VERSION: "1.24.4"

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          # full history + tags so `git describe --tags` works for the
          # version field on the deploy notification
          fetch-depth: 0

      - name: Compute image tag + version
        id: meta
        run: |
          echo "tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          # Prefer git describe; fall back to short SHA if no tag yet.
          # Normalize "v7.5.2.1-3-g9cfe074" → "v7.5.2.1+3" for nicer
          # display; exact-tag commits stay as "v7.5.2.1".
          raw=$(git describe --tags --always 2>/dev/null || echo "${GITHUB_SHA::7}")
          case "$raw" in
            *-g*) base=${raw%-g*}; n=${base##*-}; tag=${base%-*}; pretty="$tag+$n" ;;
            *)    pretty="$raw" ;;
          esac
          echo "version=$pretty" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE }}:latest
          build-args: |
            GO_VERSION=${{ env.GO_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG }}
        run: |
          mkdir -p "$HOME/.kube"
          printf '%s' "$KUBECONFIG_DATA" > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Roll deployment
        env:
          IMAGE_REF: ${{ env.IMAGE }}:${{ needs.build.outputs.tag }}
        run: |
          set -euo pipefail
          kubectl -n memo set image deploy/memo-syncer app="$IMAGE_REF"
          kubectl -n memo rollout status deploy/memo-syncer --timeout=240s
          kubectl -n memo get pods -l app=memo-syncer -o wide

  notify:
    needs: [build, deploy]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Compute overall status
        id: s
        run: |
          if [[ "${{ needs.build.result }}" == "success" && "${{ needs.deploy.result }}" == "success" ]]; then
            echo "status=success" >> "$GITHUB_OUTPUT"
          else
            echo "status=failure" >> "$GITHUB_OUTPUT"
          fi

      - name: Notify bot
        env:
          SERVICE: memo-syncer
          CLUSTER: sumemo-us
          VERSION: ${{ needs.build.outputs.version }}
          TAG: ${{ needs.build.outputs.tag }}
          STATUS: ${{ steps.s.outputs.status }}
          BUILD: ${{ needs.build.result }}
          DEPLOY: ${{ needs.deploy.result }}
          COMMIT: ${{ github.sha }}
          COMMIT_URL: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          TOKEN: ${{ secrets.GHA_WEBHOOK_TOKEN }}
        run: |
          payload=$(jq -nc \
            --arg service "$SERVICE" \
            --arg version "$VERSION" \
            --arg tag "$TAG" \
            --arg cluster "$CLUSTER" \
            --arg status "$STATUS" \
            --arg build "$BUILD" \
            --arg deploy "$DEPLOY" \
            --arg commit "$COMMIT" \
            --arg commit_url "$COMMIT_URL" \
            --arg run_url "$RUN_URL" \
            '{service:$service, version:$version, tag:$tag, cluster:$cluster,
              status:$status, build:$build, deploy:$deploy,
              commit:$commit, commit_url:$commit_url, run_url:$run_url}')
          # Best-effort — don't fail the workflow on notify error.
          curl -fsS -X POST https://bot.sumemo.dev/webhook/gha \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -H "X-Webhook-Id: ${{ github.run_id }}-${{ github.run_attempt }}" \
            -d "$payload" || echo "notify failed (non-fatal)"
