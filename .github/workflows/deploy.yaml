name: build-and-deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - ".gitignore"
      - "k8s/**"
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/memo-syncer
  GO_VERSION: "1.24.12"

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          # full history + tags so `git describe --tags` works for the version baked into MEMO_VERSION / notify payload.
          fetch-depth: 0

      - name: Compute image tag + version
        id: meta
        run: |
          echo "tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "build=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          # prefer git describe; fall back to short SHA if no tag yet.
          # normalize "v7.5.2.1-3-g9cfe074" → "v7.5.2.1+3" for nicer display; exact-tag commits stay as "v7.5.2.1".
          raw=$(git describe --tags --always 2>/dev/null || echo "${GITHUB_SHA::7}")
          case "$raw" in
            *-g*) base=${raw%-g*}; n=${base##*-}; tag=${base%-*}; pretty="$tag+$n" ;;
            *)    pretty="$raw" ;;
          esac
          echo "version=$pretty" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE }}:latest
          build-args: |
            GO_VERSION=${{ env.GO_VERSION }}
            MEMO_VERSION=${{ steps.meta.outputs.version }}
            MEMO_BUILD=${{ steps.meta.outputs.build }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG }}
        run: |
          mkdir -p "$HOME/.kube"
          printf '%s' "$KUBECONFIG_DATA" > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Roll deployment
        env:
          IMAGE_REF: ${{ env.IMAGE }}:${{ needs.build.outputs.tag }}
        run: |
          set -euo pipefail
          kubectl -n memo set image deploy/memo-syncer app="$IMAGE_REF"
          kubectl -n memo rollout status deploy/memo-syncer --timeout=240s
          kubectl -n memo get pods -l app=memo-syncer -o wide

  notify:
    needs: [build, deploy]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Compute overall status
        id: s
        run: |
          if [[ "${{ needs.build.result }}" == "success" && "${{ needs.deploy.result }}" == "success" ]]; then
            echo "status=success" >> "$GITHUB_OUTPUT"
          else
            echo "status=failure" >> "$GITHUB_OUTPUT"
          fi

      - uses: open-xiv/gha-actions/notify-deploy@v1
        with:
          status: ${{ steps.s.outputs.status }}
          service: memo-syncer
          kind: deploy
          version: ${{ needs.build.outputs.version }}
          cluster: sumemo-us
          build: ${{ needs.build.result }}
          deploy: ${{ needs.deploy.result }}
          webhook_token: ${{ secrets.GHA_WEBHOOK_TOKEN }}
